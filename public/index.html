<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiguuDev Control Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal.css">
</head>
<body>

<div class="portal-bg" id="portalBg"></div>
<div class="portal-grain"></div>

<!-- Password Gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>BiguuDev Control</h1>
    <p class="gate-sub">Enter password to continue</p>
    <input id="gatePassword" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter') attemptGate();">
    <button class="btn-liquid" onclick="attemptGate()">Unlock</button>
    <button class="gate-forgot" type="button" onclick="toggleForgot()">Forgot password?</button>
    <div class="gate-reset" id="gateReset">
      <input id="gateResetKey" type="text" placeholder="Reset key" onkeydown="if(event.key==='Enter') attemptGateReset();">
      <button class="btn-ghost-liquid" onclick="attemptGateReset()">Use reset key</button>
    </div>
    <p class="gate-error" id="gateError"></p>
  </div>
</div>

<!-- Selector -->
<div class="selector" id="selector">
  <div class="selector-head">
    <div class="selector-eyebrow">BIGUUDEV</div>
    <h1>Control Portal</h1>
    <p>Choose which system you want to manage.</p>
  </div>

  <div class="selector-grid">
    <a class="panel-card" href="https://biguudev.store/my%20key%20project/index.html" target="_blank" rel="noopener">
      <div class="panel-card-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      </div>
      <div class="panel-card-name">Key Reset Panel</div>
      <div class="panel-card-desc">License / key &amp; user management for the script product.</div>
      <div class="panel-card-cta">Enter <span>→</span></div>
    </a>

    <a class="panel-card" href="main.html">
      <div class="panel-card-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div class="panel-card-name">BiguuDev.store Admin</div>
      <div class="panel-card-desc">Core platform — users, reviews, guide video &amp; site settings.</div>
      <div class="panel-card-cta">Enter <span>→</span></div>
    </a>
  </div>
</div>

<script src="portal.js"></script>
</body>
</html>
